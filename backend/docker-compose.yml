services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: deltamind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deltamind
      POSTGRES_USER: deltamind
      POSTGRES_PASSWORD: deltamind_dev_password
    ports:
      - "5432:5432"
    volumes:
      - deltamind_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deltamind -d deltamind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  deltamind_postgres_data:
